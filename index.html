<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crystal Select｜SV01 Standard Selection Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/papaparse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --paper:#F3F2ED; --paper-deep:#ECE9E1;
    --ink:#20231F; --ink-soft:rgba(32,35,31,0.60); --ink-faint:rgba(32,35,31,0.38);
    --jade:#2F5D4E; --jade-deep:#1F4438; --jade-tint:#E4ECE7;
    --vermilion:#B0473E; --vermilion-tint:#F4E3DF;
    --line-green:#06C755; --line-green-deep:#05A847;
    --card:#FFFFFF; --hairline:rgba(32,35,31,0.12);
    --radius:16px; --radius-sm:10px;
    --serif:'Noto Serif TC', serif; --sans:'Noto Sans TC', system-ui, -apple-system, sans-serif;
    --shadow-card:0 1px 2px rgba(32,35,31,0.04), 0 8px 24px -12px rgba(32,35,31,0.18);
    --shadow-tray:0 -8px 30px rgba(32,35,31,0.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper); color:var(--ink); font-family:var(--sans); -webkit-font-smoothing:antialiased; padding-bottom:96px;}
  a{color:inherit;}
  header.site{position:sticky; top:0; z-index:20; background:var(--paper); border-bottom:1px solid var(--hairline);}
  .header-inner{max-width:1180px; margin:0 auto; padding:22px 24px 16px; display:flex; align-items:flex-end; justify-content:space-between; gap:24px; flex-wrap:wrap;}
  .wordmark{display:flex; flex-direction:column; gap:4px;}
  .wordmark .zh{font-family:var(--serif); font-weight:900; font-size:1.7rem; letter-spacing:0.04em; line-height:1;}
  .wordmark .en{font-size:0.7rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--ink-soft); font-weight:600;}
  .tagline{font-size:0.82rem; color:var(--ink-soft); margin-top:2px;}
  .search-wrap{display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--hairline); border-radius:999px; padding:9px 16px; min-width:240px; flex:0 1 320px;}
  .search-wrap svg{flex-shrink:0; opacity:0.45;}
  .search-wrap input{border:none; outline:none; background:none; font-family:var(--sans); font-size:0.88rem; width:100%; color:var(--ink);}
  .meta-row{max-width:1180px; margin:0 auto; padding:4px 24px 14px; font-size:0.78rem; color:var(--ink-faint);}
  .filter-bar{max-width:1180px; margin:0 auto; padding:0 24px 18px; display:flex; gap:8px; overflow-x:auto; scrollbar-width:none;}
  .filter-bar::-webkit-scrollbar{display:none;}
  .pill{flex-shrink:0; padding:7px 16px; border-radius:999px; border:1px solid var(--hairline); background:var(--card); font-size:0.82rem; font-weight:500; cursor:pointer; white-space:nowrap; transition:background .15s, color .15s, border-color .15s;}
  .pill:hover{border-color:var(--jade);}
  .pill.active{background:var(--jade); border-color:var(--jade); color:#fff;}
  main{max-width:1180px; margin:0 auto; padding:8px 24px 40px;}
  .grid{display:grid; gap:20px; grid-template-columns:repeat(auto-fill, minmax(252px, 1fr));}
  .empty-state{text-align:center; padding:80px 20px; color:var(--ink-soft);}
  .empty-state .big{font-family:var(--serif); font-size:1.1rem; color:var(--ink); margin-bottom:6px;}
  .card{background:var(--card); border-radius:var(--radius); border:1px solid var(--hairline); overflow:hidden; box-shadow:var(--shadow-card); display:flex; flex-direction:column; transition:transform .18s ease, box-shadow .18s ease;}
  .card:hover{transform:translateY(-3px); box-shadow:0 4px 6px rgba(32,35,31,0.05), 0 16px 32px -14px rgba(32,35,31,0.26);}
  .thumb{position:relative; aspect-ratio:4/3; width:100%; overflow:hidden; cursor:pointer; background:#fafaf8;}
  .thumb.placeholder{background:repeating-linear-gradient(135deg, var(--c1) 0 14px, var(--c2) 14px 28px);}
  .thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .thumb .cat-tag{position:absolute; left:10px; top:10px; background:rgba(255,255,255,0.88); color:var(--ink); font-size:0.68rem; font-weight:700; padding:4px 9px; border-radius:999px; letter-spacing:0.02em;}
  .thumb .ph-note{position:absolute; right:10px; bottom:10px; background:rgba(32,35,31,0.55); color:#fff; font-size:0.64rem; padding:3px 8px; border-radius:999px;}
  .card-body{padding:16px 16px 14px; display:flex; flex-direction:column; gap:10px; flex:1;}
  .name-zh{font-family:var(--serif); font-weight:700; font-size:1.02rem; line-height:1.3; cursor:pointer;}
  .name-en{font-size:0.72rem; color:var(--ink-faint); letter-spacing:0.02em; margin-top:-6px;}
  .tag-row{display:flex; gap:6px; flex-wrap:wrap;}
  .tag{font-size:0.68rem; padding:3px 9px; border-radius:999px; background:var(--jade-tint); color:var(--jade-deep); font-weight:600;}
  .spec-list{font-size:0.76rem; color:var(--ink-soft); line-height:1.6;}
  .spec-list b{color:var(--ink); font-weight:600;}
  .price-row{display:flex; align-items:baseline; justify-content:space-between; margin-top:auto; padding-top:8px; border-top:1px solid var(--hairline);}
  .price-row .price{font-family:var(--serif); font-weight:700; font-size:1.05rem;}
  .price-row .price small{font-family:var(--sans); font-size:0.68rem; font-weight:500; color:var(--ink-faint);}
  .price-row .moq{font-size:0.68rem; color:var(--ink-faint); text-align:right;}
  .btn-row{display:flex; gap:8px; padding:0 16px 16px;}
  .btn{flex:1; padding:9px 0; border-radius:999px; font-size:0.8rem; font-weight:600; border:1px solid var(--hairline); background:var(--paper); cursor:pointer; text-align:center; transition:all .15s;}
  .btn.detail:hover{border-color:var(--ink-soft);}
  .btn.add{border-color:var(--jade); color:var(--jade); background:#fff;}
  .btn.add:hover{background:var(--jade-tint);}
  .btn.add.added{background:var(--jade); color:#fff;}
  .overlay{position:fixed; inset:0; background:rgba(20,22,19,0.55); display:none; align-items:center; justify-content:center; padding:20px; z-index:100;}
  .overlay.open{display:flex;}
  .modal{background:#fff; border-radius:18px; max-width:680px; width:100%; max-height:88vh; overflow-y:auto; position:relative;}
  .modal .thumb{aspect-ratio:16/9;}
  .modal-body{padding:24px 26px 26px;}
  .modal-close{position:absolute; top:14px; right:14px; width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,0.92); border:none; cursor:pointer; font-size:1.1rem; line-height:32px; text-align:center; z-index:5;}
  .modal h2{font-family:var(--serif); font-size:1.3rem; margin:0 0 2px;}
  .modal .name-en{display:block; margin-bottom:14px;}
  .img-dots{position:absolute; bottom:10px; left:50%; transform:translateX(-50%); display:flex; gap:6px; z-index:5;}
  .img-dots button{width:7px; height:7px; border-radius:50%; border:none; padding:0; background:rgba(255,255,255,0.55); cursor:pointer;}
  .img-dots button.active{background:#fff;}
  .spec-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px 18px; font-size:0.82rem; margin:16px 0; padding:16px 0; border-top:1px solid var(--hairline); border-bottom:1px solid var(--hairline);}
  .spec-grid .label{color:var(--ink-faint); font-size:0.72rem; margin-bottom:2px;}
  .spec-grid .value{color:var(--ink); font-weight:500;}
  .tray{position:fixed; left:0; right:0; bottom:0; z-index:50; background:#fff; box-shadow:var(--shadow-tray); transform:translateY(100%); transition:transform .25s ease;}
  .tray.show{transform:translateY(0);}
  .tray-bar{max-width:1180px; margin:0 auto; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; gap:16px;}
  .tray-count{font-size:0.88rem; font-weight:600;}
  .tray-count span{color:var(--vermilion);}
  .tray-actions{display:flex; align-items:center; gap:10px;}
  .tray-toggle{background:none; border:1px solid var(--hairline); border-radius:999px; padding:8px 14px; font-size:0.78rem; cursor:pointer; font-weight:500;}
  .line-btn{display:flex; align-items:center; gap:7px; background:var(--line-green); color:#fff; border:none; padding:11px 20px; border-radius:999px; font-size:0.85rem; font-weight:700; cursor:pointer; white-space:nowrap;}
  .line-btn:hover{background:var(--line-green-deep);}
  .tray-list{max-width:1180px; margin:0 auto; padding:0 24px 16px; display:none; flex-direction:column; gap:8px;}
  .tray-list.open{display:flex;}
  .tray-item{display:flex; align-items:center; justify-content:space-between; background:var(--paper); border-radius:var(--radius-sm); padding:8px 12px; font-size:0.8rem;}
  .tray-item button{border:none; background:none; cursor:pointer; color:var(--ink-faint); font-size:0.9rem;}
  .load-banner{max-width:1180px; margin:0 auto; padding:10px 24px; font-size:0.76rem; color:var(--vermilion); display:none;}
  @media (max-width:560px){
    .header-inner{padding:18px 16px 12px;}
    .filter-bar, main, .meta-row, .tray-bar, .tray-list, .load-banner{padding-left:16px; padding-right:16px;}
    .wordmark .zh{font-size:1.4rem;}
    .spec-grid{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>

<header class="site">
  <div class="header-inner">
    <div class="wordmark">
      <div class="zh">Crystal Select</div>

    </div>

<div class="overlay" id="overlay">

</div>

<div class="tray" id="tray">

        前往 LINE 詢價
      </button>
    </div>
  </div>
</div>

<script>
/* =========================================================

   之後新增/編輯商品，只要在 Sheet 改，網頁就會自動更新，
   不需要再重新產生這個檔案。
   ========================================================= */

/* 萬一即時讀取失敗時的備用資料（最近一次手動確認過的版本） */

  {id:"LF-25-002", nameZh:"活力行李吊牌", nameEn:"Owee Voyage Tag", theme:"企業識別", theme2:"專家會議", occasions:"對外業務拜訪、團隊活動、國際會議", material:"聚酯纖維、PVC透明片、傘繩、紙", size:"12×6cm", origin:"中國製造｜臺灣製造", retail:280, moq:500, lead:60, custom:"設計套版，量產製作", packaging:"企業形象背卡"},
  {id:"LF-25-003", nameZh:"極輕便的飲料提繩", nameEn:"ToGo Drink Strap", theme:"企業識別", theme2:"慢漫生活", occasions:"周邊商品、校園徵才、活動小物", material:"快解扣-塑膠、傘繩", size:"提把長度約25cm，開口寬度約17cm", origin:"臺灣製造", retail:168, moq:1000, lead:60, custom:"傘繩選色、織標訂製", packaging:"企業形象背卡"},
  {id:"ST25-003", nameZh:"圈圈待辦便利貼", nameEn:"Smile Circle Memo Pad", theme:"企業識別", theme2:"慢漫生活", occasions:"周邊商品、校園徵才、展會推廣", material:"白模造、銅西卡", size:"便利貼40頁，背卡11×8cm", origin:"臺灣設計、臺灣製造", retail:80, moq:1000, lead:40, custom:"依設計套版印刷", packaging:"單入透明袋"},
  {id:"BA-26-005", nameZh:"離線感小圓包", nameEn:"#OFFLINE Orbit Pouch", theme:"企業識別", theme2:"新的開始", occasions:"周邊商品、校園徵才、活動小物", material:"PU革、聚脂纖維、拉鍊、金屬扣", size:"直徑8cm", origin:"臺灣設計，中國製造", retail:420, moq:500, lead:60, custom:"PU革選色、印刷單處單色LOGO", packaging:"單入透明袋"},
  {id:"BA-26-006", nameZh:"日日隨行收納包", nameEn:"Daily Carry Pouch", theme:"慢漫生活", theme2:"企業識別", occasions:"員工福利、周邊商品、對外業務拜訪", material:"棉紡布料、拉鍊", size:"L16×W11.5×D5cm", origin:"中國製造", retail:520, moq:500, lead:60, custom:"布料選色、LOGO客製", packaging:"單入透明袋"},

  {id:"BA-26-004", nameZh:"拉鍊帆布小托特", nameEn:"Go for a walk Tote", theme:"慢漫生活", theme2:"企業識別", occasions:"員工福利、周邊商品", material:"16oz棉帆布、拉鍊", size:"棉紡布料、拉鍊", origin:"中國製造", retail:520, moq:300, lead:60, custom:"提手選色、LOGO印製", packaging:"單入透明袋"},
  {id:"ST24-001", nameZh:"專業授證｜鋁合金證書框", nameEn:"Professional Recognition Frame", theme:"專家會議", theme2:"一起走過", occasions:"學術會議、感謝狀", material:"金屬、MDF密集板", size:"A4，內徑21×29.9cm", origin:"中國製造", retail:280, moq:1, lead:15, custom:"無提供客製", packaging:"無提供客製"},
  {id:"ST24-002", nameZh:"榮譽典藏｜水晶玻璃證書框", nameEn:"Crystal Prestige Frame", theme:"專家會議", theme2:"一起走過", occasions:"學術會議、感謝狀", material:"水晶玻璃", size:"A4，內徑21×29.9cm", origin:"中國製造", retail:340, moq:1, lead:15, custom:"無提供客製", packaging:"無提供客製"}

const CATEGORY_INFO = {
  PR:{name:"印刷紙品", c1:"#C9695F", c2:"#B0473E"},
  DI:{name:"餐食器皿", c1:"#D8B65A", c2:"#C9A227"},
  BA:{name:"包袋配件", c1:"#3E6F60", c2:"#2F5D4E"},
  HO:{name:"居家生活", c1:"#7E70A8", c2:"#6B5B95"},
  AP:{name:"服飾配件", c1:"#5483A0", c2:"#3B6E8F"},
  ST:{name:"文具用品", c1:"#A1815E", c2:"#8C6D46"},
  LF:{name:"隨身生活", c1:"#6E94BD", c2:"#4F7CAC"}
};

/* TODO：換成晶品官方 LINE 的真實帳號 ID（@開頭），目前是佔位用假帳號 */
const LINE_OA_ID = "@968veimr";

let PRODUCTS = [];
let activeTheme = "全部";
let searchTerm = "";
let trayIds = [];
let modalImgIndex = 0;

function categoryOf(id){ return (id||"").split("-")[0]; }

function num(v){
  if(v==null) return null;
  v = String(v).trim().replace(/,/g,"");
  if(v==="" || v==="-" || v.toUpperCase()==="N/A") return null;
  const n = parseFloat(v);
  return isNaN(n) ? null : n;
}
function str(v){ return (v==null) ? "" : String(v).trim(); }

/* CSV 欄位是固定位置對應（A=0 ... AC=28），不是用標題文字比對，
   這樣即使 Sheet 上方有合併儲存格/說明文字，也不會抓錯欄位 */
function rowToProduct(row){
  const id = str(row[0]);
  const status = str(row[26]);
  if(!id || status !== "上架中") return null;
  const nameZh = str(row[1]);
  if(!nameZh) return null;
  return {
    id, nameZh, nameEn: str(row[2]),
    theme: str(row[3]), theme2: str(row[4]), occasions: str(row[5]),
    material: str(row[6]), size: str(row[7]), weight: str(row[8]), origin: str(row[9]),
    retail: num(row[18]), moq: num(row[19]), lead: num(row[20]),
    custom: str(row[21]), packaging: str(row[22])
  };
}

function loadFromSheet(){
  Papa.parse(SHEET_CSV_URL, {
    download: true,
    complete: function(results){
      try{
        const products = results.data.map(rowToProduct).filter(Boolean);
        if(products.length === 0) throw new Error("no rows parsed");
        PRODUCTS = products;
        document.getElementById("loadBanner").style.display = "none";
      } catch(e){
        console.warn("Sheet 解析失敗，改用備用資料", e);
        PRODUCTS = FALLBACK_PRODUCTS;
        document.getElementById("loadBanner").style.display = "block";
      }
      render(); renderTray();
    },
    error: function(err){
      console.warn("Sheet 讀取失敗，改用備用資料", err);
      PRODUCTS = FALLBACK_PRODUCTS;
      document.getElementById("loadBanner").style.display = "block";
      render(); renderTray();
    }
  });
}

function buildFilterBar(){
  const themes = ["全部", ...new Set(PRODUCTS.map(p=>p.theme).filter(Boolean))];
  const bar = document.getElementById("filterBar");
  bar.innerHTML = themes.map(t=>
    `<button class="pill ${t===activeTheme?'active':''}" data-theme="${t}">${t}</button>`
  ).join("");
  bar.querySelectorAll(".pill").forEach(btn=>{
    btn.addEventListener("click", ()=>{ activeTheme = btn.dataset.theme; render(); });
  });
}

function matches(p){
  const themeOk = activeTheme==="全部" || p.theme===activeTheme;
  const term = searchTerm.trim();
  const searchOk = !term || [p.nameZh,p.nameEn,p.material,p.occasions,p.theme,p.theme2]
    .join(" ").toLowerCase().includes(term.toLowerCase());
  return themeOk && searchOk;
}

function priceHTML(p){
  if(p.retail==null){
    return `<div class="price">洽詢報價 <small>請透過 LINE 詢問</small></div>`;
  }
  return `<div class="price">NT$ ${p.retail.toLocaleString()} <small>單件參考價</small></div>`;
}
function moqHTML(p){
  const moq = p.moq==null ? "洽詢" : p.moq;
  const lead = p.lead==null ? "洽詢" : `${p.lead}天`;
  return `MOQ ${moq}・交期${lead}`;
}

function cardHTML(p){
  const cat = CATEGORY_INFO[categoryOf(p.id)] || {name:"其他", c1:"#ccc", c2:"#999"};
  const added = trayIds.includes(p.id);
  return `
  <div class="card" data-id="${p.id}">
    <div class="thumb" style="--c1:${cat.c1};--c2:${cat.c2};" onclick="openModal('${p.id}')">
      <img src="images/${p.id}-1.jpg" alt="${p.nameZh}" onerror="imgFallback(this,'${cat.name}')">
    </div>
    <div class="card-body">
      <div>
        <div class="name-zh" onclick="openModal('${p.id}')">${p.nameZh}</div>
        <div class="name-en">${p.nameEn}</div>
      </div>
      <div class="tag-row">
        ${p.theme?`<span class="tag">${p.theme}</span>`:""}
        ${p.theme2?`<span class="tag">${p.theme2}</span>`:""}
      </div>
      <div class="spec-list">
        <div><b>材質</b>　${p.material||"—"}</div>
        <div><b>尺寸</b>　${p.size||"—"}</div>
      </div>
      <div class="price-row">
        ${priceHTML(p)}
        <div class="moq">${moqHTML(p)}</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn detail" onclick="openModal('${p.id}')">詳情</button>
      <button class="btn add ${added?'added':''}" onclick="toggleTray('${p.id}', event)">${added?'已加入 ✓':'+ 加入詢價'}</button>
    </div>
  </div>`;
}

function imgFallback(img, catName){
  img.style.display = "none";
  const thumb = img.parentElement;
  thumb.classList.add("placeholder");
  if(!thumb.querySelector(".cat-tag")){
    thumb.insertAdjacentHTML("beforeend", `<span class="cat-tag">${catName}</span><span class="ph-note">圖片建置中</span>`);
  }
}

function render(){
  buildFilterBar();
  const list = PRODUCTS.filter(matches);
  document.getElementById("metaRow").textContent = `共 ${PRODUCTS.length} 件商品上架中，目前顯示 ${list.length} 件`;
  const grid = document.getElementById("grid");
  const empty = document.getElementById("emptyState");
  if(list.length===0){
    grid.style.display="none"; empty.style.display="block";
  } else {
    grid.style.display="grid"; empty.style.display="none";
    grid.innerHTML = list.map(cardHTML).join("");
  }
}

function testImage(url){
  return new Promise(resolve=>{
    const img = new Image();
    img.onload = ()=>resolve(true);
    img.onerror = ()=>resolve(false);
    img.src = url;
  });
}

async function openModal(id, keepIndex){
  window._currentModalId = id;
  const p = PRODUCTS.find(x=>x.id===id);
  const cat = CATEGORY_INFO[categoryOf(p.id)] || {name:"其他", c1:"#ccc", c2:"#999"};
  if(!keepIndex){
    modalImgIndex = 0;
    const [has1, has2] = await Promise.all([
      testImage(`images/${id}-1.jpg`), testImage(`images/${id}-2.jpg`)
    ]);
    window._modalImgs = [];
    if(has1) window._modalImgs.push(`images/${id}-1.jpg`);
    if(has2) window._modalImgs.push(`images/${id}-2.jpg`);
  }
  const imgs = window._modalImgs;
  const added = trayIds.includes(p.id);

  let thumbInner;
  if(imgs.length){
    thumbInner = `<img src="${imgs[modalImgIndex]||imgs[0]}" alt="${p.nameZh}">`;
  } else {
    thumbInner = `<span class="cat-tag">${cat.name}</span><span class="ph-note">圖片建置中</span>`;
  }
  let dots = "";
  if(imgs.length>1){
    dots = `<div class="img-dots">` + imgs.map((_,i)=>
      `<button class="${i===modalImgIndex?'active':''}" onclick="setModalImg(${i})"></button>`
    ).join("") + `</div>`;
  }
  const thumbClass = imgs.length ? "thumb" : "thumb placeholder";

  document.getElementById("modalContent").innerHTML = `
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="${thumbClass}" style="--c1:${cat.c1};--c2:${cat.c2};">${thumbInner}${dots}</div>
    <div class="modal-body">
      <h2>${p.nameZh}</h2>
      <span class="name-en">${p.nameEn}　｜　產品ID：${p.id}</span>
      <div class="tag-row">
        ${p.theme?`<span class="tag">${p.theme}</span>`:""}${p.theme2?`<span class="tag">${p.theme2}</span>`:""}
      </div>
      <div class="spec-grid">
        <div><div class="label">適合場合</div><div class="value">${p.occasions||"—"}</div></div>
        <div><div class="label">產地</div><div class="value">${p.origin||"—"}</div></div>
        <div><div class="label">材質／成分</div><div class="value">${p.material||"—"}</div></div>
        <div><div class="label">尺寸</div><div class="value">${p.size||"—"}</div></div>
        <div><div class="label">商品客製選項</div><div class="value">${p.custom||"—"}</div></div>
        <div><div class="label">包裝客製選項</div><div class="value">${p.packaging||"—"}</div></div>
        <div><div class="label">最小起訂量</div><div class="value">${p.moq!=null?p.moq+' 件':'洽詢'}</div></div>
        <div><div class="label">交期</div><div class="value">${p.lead!=null?'約 '+p.lead+' 天':'洽詢'}</div></div>
      </div>
      <div class="price-row" style="border-top:none; padding-top:0;">
        ${p.retail!=null
          ? `<div class="price">NT$ ${p.retail.toLocaleString()} <small>單件參考價／企業大量採購請洽詢</small></div>`
          : `<div class="price">洽詢報價</div>`}
      </div>
      <div class="btn-row" style="padding:18px 0 0;">
        <button class="btn add ${added?'added':''}" style="flex:1;" onclick="toggleTray('${p.id}', event)">${added?'已加入詢價清單 ✓':'+ 加入詢價清單'}</button>
      </div>
    </div>`;
  document.getElementById("overlay").classList.add("open");
}
function setModalImg(i){ modalImgIndex = i; openModal(window._currentModalId, true); }
function closeModal(){ document.getElementById("overlay").classList.remove("open"); }
document.getElementById("overlay").addEventListener("click", e=>{
  if(e.target.id==="overlay") closeModal();
});

function toggleTray(id, evt){
  if(evt) evt.stopPropagation();
  const i = trayIds.indexOf(id);
  if(i>-1) trayIds.splice(i,1); else trayIds.push(id);
  render();
  if(document.getElementById("overlay").classList.contains("open")) openModal(id, true);
  renderTray();
}

function renderTray(){
  const tray = document.getElementById("tray");
  const list = document.getElementById("trayList");
  document.getElementById("trayCountNum").textContent = trayIds.length;
  tray.classList.toggle("show", trayIds.length>0);
  list.innerHTML = trayIds.map(id=>{
    const p = PRODUCTS.find(x=>x.id===id);
    if(!p) return "";
    return `<div class="tray-item"><span>${p.nameZh}（${p.id}）</span><button onclick="toggleTray('${id}')">移除</button></div>`;
  }).join("");
}

document.getElementById("trayToggle").addEventListener("click", ()=>{
  const list = document.getElementById("trayList");
  const open = list.classList.toggle("open");
  document.getElementById("trayToggle").textContent = open ? "收合清單 ▼" : "查看清單 ▲";
});

document.getElementById("lineBtn").addEventListener("click", ()=>{
  if(trayIds.length===0){
    window.open(`https://line.me/R/ti/p/${encodeURIComponent(LINE_OA_ID)}`, "_blank");
    return;
  }
  const lines = trayIds.map(id=>{
    const p = PRODUCTS.find(x=>x.id===id);
    return p ? `・${p.nameZh}（${p.id}）` : "";
  }).filter(Boolean).join("\n");
  const msg = `您好，我在晶品線上型錄中對以下商品感興趣，想詢問報價與訂購方式：\n${lines}\n\n麻煩提供進一步資訊，謝謝！`;
  const url = `https://line.me/R/oaMessage/${encodeURIComponent(LINE_OA_ID)}/?${encodeURIComponent(msg)}`;
  window.open(url, "_blank");
});

document.getElementById("searchInput").addEventListener("input", e=>{
  searchTerm = e.target.value; render();
});

loadFromSheet();
</script>
</body>
</html>
